<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Test Deployment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }
        .status {
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .time {
            font-size: 1.2rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }
        .message {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.9;
        }
        .footer {
            font-size: 0.9rem;
            margin-top: 30px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">✅ Vercel Deployment Test</div>
        <div class="time">Deployed at: <span id="deployTime">Loading...</span></div>
        <div class="message">
            <p>🚀 Vercel deployment is working correctly!</p>
            <p>🌐 Your site is live and accessible.</p>
            <p>🔗 This confirms the deployment pipeline is functioning.</p>
        </div>
        <div class="footer">
            News Actions Business Bites - Vercel Deployment Test
        </div>
    </div>

    <script>
        // Display deployment time
        document.getElementById('deployTime').textContent =
            new Date().toLocaleString('en-IN', {
                timeZone: 'Asia/Kolkata',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
    </script>
</body>
</html>
